---
layout: default
---

<canvas id="canvas"></canvas>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
</script>
<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

canvas.width = canvas.height = 512;

const renderer = new THREE.WebGLRenderer({ canvas, context: canvas.getContext("webgl2",{ antialias: false, preserveDrawingBuffer: true }) });
renderer.setSize(canvas.width,canvas.height,true);
renderer.setPixelRatio(1);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

const camera = new THREE.PerspectiveCamera(90,canvas.width/canvas.height,0.125,256);
camera.position.set(0,0,2);
const scene = new THREE.Scene();

const vs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
void main() {
  vP = position;
  vN = normal;
  vW = (modelMatrix*vec4(position,1)).xyz;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1);
}`;

const glsl = `
uniform float iTime;
uniform float iA;
uniform int iB;
uniform vec3 iC;
struct light {
  vec3 p;
  float i;
  float w[4];
};
uniform light iL;
uniform light iLs[2];

vec3 render(vec3 ro, vec3 rd) { 
  return rd+iA+float(iB)+iC+iL.p+ils[0].p;
}
`;

const fs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;

${glsl}

void main() {
  vec3 ro = cameraPosition;
  vec3 rd = normalize(vW-ro);
  gl_FragColor = vec4(render(ro,rd),1);
}`;

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.ShaderMaterial({
    vertexShader: vs,
    fragmentShader: fs,
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      iTime: { value: 0 }
    }
  })
);
scene.add(cube);

window.log = () => {
  const gl = renderer.getContext();

  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs,`#version 300 es
    void main() { gl_Position = vec4(0); }
  `);
  gl.compileShader(vs);
  
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs,`#version 300 es
    precision highp float;
    ${glsl}
    out vec4 fragColor;
    void main() {
      fragColor = vec4(render(vec3(0),vec3(0)),1);
    }
  `);
  gl.compileShader(fs);
  
  const program = gl.createProgram();
  gl.attachShader(program,vs);
  gl.attachShader(program,fs);
  gl.linkProgram(program);

  const uniformCount = gl.getProgramParameter(program,gl.ACTIVE_UNIFORMS);
  const uniformList = [];
  for (let i = 0; i < uniformCount; i++) {
    const info = gl.getActiveUniform(program,i);
    console.log(info);
    uniformList.push({
      name: info.name,
      type: info.type,
      size: info.size
    });
  }
  console.log(uniformList);
}

const controls = new OrbitControls(camera,renderer.domElement);
const update = (time) => {
  cube.material.uniforms.iTime.value = time*0.001;
  renderer.render(scene,camera);
  requestAnimationFrame(update);
}
update(0);
  
</script>
