---
layout: default
---

<canvas id="canvas"></canvas>
<div id="uniforms"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
</script>
<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

canvas.width = canvas.height = 512;

const renderer = new THREE.WebGLRenderer({ canvas, context: canvas.getContext("webgl2",{ antialias: false, preserveDrawingBuffer: true }) });
renderer.setSize(canvas.width,canvas.height,true);
renderer.setPixelRatio(1);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

const camera = new THREE.PerspectiveCamera(90,canvas.width/canvas.height,0.125,256);
camera.position.set(0,0,2);
const scene = new THREE.Scene();

const vs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
void main() {
  vP = position;
  vN = normal;
  vW = (modelMatrix*vec4(position,1)).xyz;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1);
}`;

const glsl = `
uniform float iTime;
uniform float iA;
uniform int iB;
uniform vec3 iC;
struct light {
  vec3 p;
  float i;
  float w[4];
};
uniform light iL;
uniform light iLs[2];

void mainCube(out vec4 col, vec3 ro, vec3 rd) { 
  col = vec4(rd+iA+float(iB)+iC+iL.p+iLs[0].p,1);
}
`;

const fs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
${glsl}
void main() {
  vec3 ro = cameraPosition;
  vec3 rd = normalize(vW-ro);
  mainCube(gl_FragColor,ro,rd);
}`;

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.ShaderMaterial({
    vertexShader: vs,
    fragmentShader: fs,
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      iTime: { value: 0 }
    }
  })
);
scene.add(cube);

const gl = renderer.getContext();

const vss = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vss,`#version 300 es
  void main() { gl_Position = vec4(0); }
`);
gl.compileShader(vss);
  
const fss = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fss,`#version 300 es
  precision highp float;
  ${glsl}
  out vec4 fragColor;
  void main() {
    mainCube(fragColor,vec3(0),vec3(0));
  }
`);
gl.compileShader(fss);

const program = gl.createProgram();
gl.attachShader(program,vss);
gl.attachShader(program,fss);
gl.linkProgram(program);

const uniformCount = gl.getProgramParameter(program,gl.ACTIVE_UNIFORMS);
const uniformList = [];
for (let i = 0; i < uniformCount; i++) {
  const info = gl.getActiveUniform(program,i);
  uniformList.push({
    name: info.name,
    type: info.type,
    size: info.size
  });
}

const uniformsHost = document.getElementById("uniforms");

const specOf = (t) => {
  switch (t) {
    case gl.FLOAT: return { kind: "float", comps: 1 };
    case gl.FLOAT_VEC2: return { kind: "float", comps: 2 };
    case gl.FLOAT_VEC3: return { kind: "float", comps: 3 };
    case gl.FLOAT_VEC4: return { kind: "float", comps: 4 };
    case gl.INT: return { kind: "int", comps: 1 };
    case gl.INT_VEC2: return { kind: "int", comps: 2 };
    case gl.INT_VEC3: return { kind: "int", comps: 3 };
    case gl.INT_VEC4: return { kind: "int", comps: 4 };
    case gl.UNSIGNED_INT: return { kind: "uint", comps: 1 };
    case gl.UNSIGNED_INT_VEC2: return { kind: "uint", comps: 2 };
    case gl.UNSIGNED_INT_VEC3: return { kind: "uint", comps: 3 };
    case gl.UNSIGNED_INT_VEC4: return { kind: "uint", comps: 4 };
    case gl.BOOL: return { kind: "bool", comps: 1 };
    case gl.BOOL_VEC2: return { kind: "bool", comps: 2 };
    case gl.BOOL_VEC3: return { kind: "bool", comps: 3 };
    case gl.BOOL_VEC4: return { kind: "bool", comps: 4 };
    case gl.FLOAT_MAT2: return { kind: "mat", rows: 2, cols: 2 };
    case gl.FLOAT_MAT3: return { kind: "mat", rows: 3, cols: 3 };
    case gl.FLOAT_MAT4: return { kind: "mat", rows: 4, cols: 4 };
    case gl.FLOAT_MAT2x3: return { kind: "mat", rows: 3, cols: 2 };
    case gl.FLOAT_MAT2x4: return { kind: "mat", rows: 4, cols: 2 };
    case gl.FLOAT_MAT3x2: return { kind: "mat", rows: 2, cols: 3 };
    case gl.FLOAT_MAT3x4: return { kind: "mat", rows: 4, cols: 3 };
    case gl.FLOAT_MAT4x2: return { kind: "mat", rows: 2, cols: 4 };
    case gl.FLOAT_MAT4x3: return { kind: "mat", rows: 3, cols: 4 };
    case gl.SAMPLER_2D: return { kind: "sampler2D" };
    default: return { kind: "other" };
  }
};

const makeTexture = () => {
  const t = new THREE.DataTexture(new Uint8Array([255, 255, 255, 255]), 1, 1);
  t.needsUpdate = true;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
};

const makeValue = (spec, count) => {
  const one = () => {
    if (spec.kind === "float") return spec.comps === 1 ? 0 : Array(spec.comps).fill(0);
    if (spec.kind === "int") return spec.comps === 1 ? 0 : Array(spec.comps).fill(0);
    if (spec.kind === "uint") return spec.comps === 1 ? 0 : Array(spec.comps).fill(0);
    if (spec.kind === "bool") return spec.comps === 1 ? false : Array(spec.comps).fill(false);
    if (spec.kind === "mat") {
      const a = Array(spec.rows * spec.cols).fill(0);
      for (let i = 0; i < Math.min(spec.rows, spec.cols); i++) a[i * spec.rows + i] = 1;
      return a;
    }
    if (spec.kind === "sampler2D") return makeTexture();
    return 0;
  };
  return count > 1 ? Array.from({ length: count }, one) : one();
};

const notify = () => {
  cube.material.uniformsNeedUpdate = true;
};

const setNumberInput = (input, read, write, integer, minZero) => {
  input.type = "number";
  input.step = integer ? "1" : "any";
  if (minZero) input.min = "0";
  input.value = read();
  input.addEventListener("input", () => {
    const v = integer ? (Number.parseInt(input.value, 10) || 0) : (Number(input.value) || 0);
    write(minZero ? Math.max(0, v) : v);
    notify();
  });
};

const setBoolInput = (input, read, write) => {
  input.type = "checkbox";
  input.checked = !!read();
  input.addEventListener("input", () => {
    write(!!input.checked);
    notify();
  });
};

const setMatrixInput = (input, value, r, c, rows, write) => {
  input.type = "number";
  input.step = "any";
  input.value = value[c * rows + r];
  input.addEventListener("input", () => {
    value[c * rows + r] = Number(input.value) || 0;
    write(value);
    notify();
  });
};

const buildSingle = (host, value, spec, write) => {
  if (spec.kind === "sampler2D") {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.addEventListener("change", () => {
      const file = input.files && input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        value.image = img;
        value.needsUpdate = true;
        URL.revokeObjectURL(url);
        write(value);
        notify();
      };
      img.src = url;
    });
    host.appendChild(input);
    return;
  }

  if (spec.kind === "mat") {
    const grid = document.createElement("div");
    for (let r = 0; r < spec.rows; r++) {
      for (let c = 0; c < spec.cols; c++) {
        const input = document.createElement("input");
        setMatrixInput(input, value, r, c, spec.rows, write);
        grid.appendChild(input);
      }
      if (r + 1 < spec.rows) grid.appendChild(document.createElement("br"));
    }
    host.appendChild(grid);
    return;
  }

  if (spec.comps === 1) {
    const input = document.createElement("input");
    setNumberInput(
      input,
      () => value,
      (v) => write(v),
      spec.kind === "int" || spec.kind === "uint",
      spec.kind === "uint"
    );
    if (spec.kind === "bool") {
      const cb = document.createElement("input");
      setBoolInput(cb, () => value, (v) => write(v));
      host.appendChild(cb);
    } else {
      host.appendChild(input);
    }
    return;
  }

  for (let i = 0; i < spec.comps; i++) {
    if (spec.kind === "bool") {
      const cb = document.createElement("input");
      setBoolInput(cb, () => value[i], (v) => {
        value[i] = v;
        write(value);
      });
      host.appendChild(cb);
    } else {
      const input = document.createElement("input");
      setNumberInput(
        input,
        () => value[i],
        (v) => {
          value[i] = v;
          write(value);
        },
        spec.kind === "int" || spec.kind === "uint",
        spec.kind === "uint"
      );
      host.appendChild(input);
    }
  }
};

const root = { label: "", children: new Map() };

for (const info of uniformList) {
  const spec = specOf(info.type);
  const base = info.size > 1 ? info.name.replace(/\[0\]$/, "") : info.name;
  const tokens = [];
  base.replace(/([^\.\[\]]+)|\[(\d+)\]/g, (_, a, b) => {
    tokens.push(a !== undefined ? a : Number(b));
    return "";
  });
  let node = root;
  for (const token of tokens) {
    if (!node.children.has(token)) node.children.set(token, { label: String(token), children: new Map() });
    node = node.children.get(token);
  }
  node.uniform = {
    key: info.name,
    size: info.size,
    spec
  };
  cube.material.uniforms[info.name] = { value: makeValue(spec, info.size) };
}

const renderNode = (node) => {
  if (node.uniform) {
    const u = node.uniform;
    const box = document.createElement("div");
    box.appendChild(document.createTextNode(node.label + " "));
    const value = cube.material.uniforms[u.key].value;

    if (u.size > 1 && u.spec.kind === "float" && u.spec.comps === 1) {
      for (let i = 0; i < u.size; i++) {
        const input = document.createElement("input");
        setNumberInput(input, () => value[i], (v) => {
          value[i] = v;
          notify();
        }, false, false);
        box.appendChild(input);
      }
      return box;
    }

    if (u.size > 1) {
      for (let i = 0; i < u.size; i++) {
        const row = document.createElement("div");
        row.appendChild(document.createTextNode("[" + i + "] "));
        buildSingle(row, value[i], u.spec, (v) => {
          value[i] = v;
          notify();
        });
        box.appendChild(row);
      }
      return box;
    }

    buildSingle(box, value, u.spec, (v) => {
      cube.material.uniforms[u.key].value = v;
      notify();
    });
    return box;
  }

  const box = document.createElement("div");
  if (node !== root) box.appendChild(document.createTextNode(node.label));
  for (const child of node.children.values()) box.appendChild(renderNode(child));
  return box;
};

uniformsHost.appendChild(renderNode(root));

const controls = new OrbitControls(camera,renderer.domElement);
const update = (time) => {
  cube.material.uniforms.iTime.value = time*0.001;
  renderer.render(scene,camera);
  requestAnimationFrame(update);
}
update(0);
  
</script>
