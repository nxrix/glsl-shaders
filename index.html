---
layout: default
---

<canvas id="canvas"></canvas>
<div id="uniforms"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
</script>
<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

canvas.width = canvas.height = 512;

const renderer = new THREE.WebGLRenderer({ canvas, context: canvas.getContext("webgl2",{ antialias: false, preserveDrawingBuffer: true }) });
renderer.setSize(canvas.width,canvas.height,true);
renderer.setPixelRatio(1);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

const camera = new THREE.PerspectiveCamera(90,canvas.width/canvas.height,0.125,256);
camera.position.set(0,0,2);
const scene = new THREE.Scene();

const vs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
void main() {
  vP = position;
  vN = normal;
  vW = (modelMatrix*vec4(position,1)).xyz;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1);
}`;

const glsl = `
uniform float iTime;
uniform float iA;
uniform int iB;
uniform vec3 iC;
struct light {
  vec3 p;
  float i;
  float w[4];
};
uniform light iL;
uniform light iLs[2];

void mainCube(out vec4 col, vec3 ro, vec3 rd) { 
  col = vec4(rd+iA+float(iB)+iC+iL.p+iLs[0].p,1);
}
`;

const fs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
${glsl}
void main() {
  vec3 ro = cameraPosition;
  vec3 rd = normalize(vW-ro);
  mainCube(gl_FragColor,ro,rd);
}`;

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.ShaderMaterial({
    vertexShader: vs,
    fragmentShader: fs,
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      iTime: { value: 0 }
    }
  })
);
scene.add(cube);

const gl = renderer.getContext();

const vss = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vss,`#version 300 es
  void main() { gl_Position = vec4(0); }
`);
gl.compileShader(vss);
  
const fss = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fss,`#version 300 es
  precision highp float;
  ${glsl}
  out vec4 fragColor;
  void main() {
    mainCube(fragColor,vec3(0),vec3(0));
  }
`);
gl.compileShader(fss);

const program = gl.createProgram();
gl.attachShader(program,vss);
gl.attachShader(program,fss);
gl.linkProgram(program);

const uniformCount = gl.getProgramParameter(program,gl.ACTIVE_UNIFORMS);
const uniformList = [];
for (let i = 0; i < uniformCount; i++) {
  const info = gl.getActiveUniform(program,i);
  uniformList.push({
    name: info.name,
    type: info.type,
    size: info.size
  });
}

const typeNames = {
  5126: "float", 5124: "int", 5125: "uint", 35664: "vec2", 35665: "vec3", 35666: "vec4",
  35667: "ivec2", 35668: "ivec3", 35669: "ivec4", 35670: "bool", 35671: "bvec2", 35672: "bvec3", 35673: "bvec4",
  36294: "uvec2", 36295: "uvec3", 36296: "uvec4",
  35676: "mat2", 35677: "mat3", 35678: "mat4",
  35686: "mat2x3", 35687: "mat2x4", 35688: "mat3x2", 35689: "mat3x4", 35690: "mat4x2", 35691: "mat4x3",
  35679: "sampler2D"
};

function setUniformValue(obj, path, value) {
  let parts = path.split(/\.|\[|\]/).filter(p => p !== "");
  for (let i = 0; i < parts.length - 1; i++) {
    let part = parts[i];
    let next = parts[i+1];
    if (!isNaN(next)) {
      if (!obj[part]) obj[part] = [];
      obj = obj[part];
    } else {
      if (!obj[part]) obj[part] = {};
      obj = obj[part];
    }
  }
  let last = parts[parts.length-1];
  obj[last] = { value: value };
}

function getUniformValue(obj, path) {
  let parts = path.split(/\.|\[|\]/).filter(p => p !== "");
  let cur = obj;
  for (let p of parts) {
    if (cur === undefined) return undefined;
    if (!isNaN(p)) cur = cur[parseInt(p)];
    else cur = cur[p];
  }
  return cur?.value;
}

function defaultUniformValue(type) {
  switch(type) {
    case "float": return 0;
    case "int": return 0;
    case "uint": return 0;
    case "bool": return false;
    case "vec2": case "ivec2": case "uvec2": return new THREE.Vector2(0,0);
    case "vec3": case "ivec3": case "uvec3": return new THREE.Vector3(0,0,0);
    case "vec4": case "ivec4": case "uvec4": return new THREE.Vector4(0,0,0,0);
    case "bvec2": return new THREE.Vector2(false,false);
    case "bvec3": return new THREE.Vector3(false,false,false);
    case "bvec4": return new THREE.Vector4(false,false,false,false);
    case "mat2": return new THREE.Matrix2().identity();
    case "mat3": return new THREE.Matrix3().identity();
    case "mat4": return new THREE.Matrix4().identity();
    case "mat2x3": return new THREE.Matrix3().set(1,0,0,0,1,0,0,0,1);
    case "mat3x2": return new THREE.Matrix3().set(1,0,0,0,1,0,0,0,1);
    case "sampler2D": return new THREE.Texture();
    default: return 0;
  }
}

const container = document.getElementById("uniforms");
container.innerHTML = "";

for (let u of uniformList) {
  let type = typeNames[u.type];
  if (!type) continue;
  let path = u.name;

  if (getUniformValue(cube.material.uniforms, path) === undefined) {
    let def = defaultUniformValue(type);
    if (u.size > 1 && type !== "sampler2D") {
      def = Array(u.size).fill().map(() => def);
    }
    setUniformValue(cube.material.uniforms, path, def);
  }

  let row = document.createElement("div");
  row.style.marginBottom = "8px";
  let label = document.createElement("span");
  label.textContent = path;
  label.style.display = "inline-block";
  label.style.width = "130px";
  row.appendChild(label);

  let control = (() => {
    let wrapper = document.createElement("div");
    wrapper.style.display = "inline-block";
    let get = () => getUniformValue(cube.material.uniforms, path);
    let set = (v) => setUniformValue(cube.material.uniforms, path, v);

    if (type === "float") {
      let inp = document.createElement("input");
      inp.type = "number"; inp.step = "any";
      inp.value = get();
      inp.oninput = () => set(parseFloat(inp.value));
      wrapper.appendChild(inp);
    } else if (type === "int" || type === "uint") {
      let inp = document.createElement("input");
      inp.type = "number"; inp.step = "1";
      inp.value = get();
      inp.oninput = () => set(parseInt(inp.value));
      wrapper.appendChild(inp);
    } else if (type === "bool") {
      let cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = get();
      cb.onchange = () => set(cb.checked);
      wrapper.appendChild(cb);
    } else if (type === "vec2" || type === "ivec2" || type === "uvec2") {
      let div = document.createElement("div"); div.style.display = "flex"; div.style.gap = "4px";
      let v = get();
      for (let i = 0; i < 2; i++) {
        let inp = document.createElement("input");
        inp.type = "number";
        inp.step = type.startsWith("i") ? "1" : "any";
        inp.value = v[["x","y"][i]];
        inp.oninput = () => set(new THREE.Vector2(parseFloat(div.children[0].value), parseFloat(div.children[1].value)));
        div.appendChild(inp);
      }
      wrapper.appendChild(div);
    } else if (type === "vec3" || type === "ivec3" || type === "uvec3") {
      let div = document.createElement("div"); div.style.display = "flex"; div.style.gap = "4px";
      let v = get();
      for (let i = 0; i < 3; i++) {
        let inp = document.createElement("input");
        inp.type = "number";
        inp.step = type.startsWith("i") ? "1" : "any";
        inp.value = v[["x","y","z"][i]];
        inp.oninput = () => set(new THREE.Vector3(parseFloat(div.children[0].value), parseFloat(div.children[1].value), parseFloat(div.children[2].value)));
        div.appendChild(inp);
      }
      wrapper.appendChild(div);
    } else if (type === "vec4" || type === "ivec4" || type === "uvec4") {
      let div = document.createElement("div"); div.style.display = "flex"; div.style.gap = "4px";
      let v = get();
      for (let i = 0; i < 4; i++) {
        let inp = document.createElement("input");
        inp.type = "number";
        inp.step = type.startsWith("i") ? "1" : "any";
        inp.value = v[["x","y","z","w"][i]];
        inp.oninput = () => set(new THREE.Vector4(parseFloat(div.children[0].value), parseFloat(div.children[1].value), parseFloat(div.children[2].value), parseFloat(div.children[3].value)));
        div.appendChild(inp);
      }
      wrapper.appendChild(div);
    } else if (type === "bvec2") {
      let div = document.createElement("div"); div.style.display = "flex"; div.style.gap = "8px";
      let v = get();
      for (let i = 0; i < 2; i++) {
        let cb = document.createElement("input"); cb.type = "checkbox";
        cb.checked = v[["x","y"][i]];
        cb.onchange = () => set(new THREE.Vector2(div.children[0].checked, div.children[1].checked));
        let lbl = document.createElement("label"); lbl.appendChild(cb); lbl.append(["x","y"][i]);
        div.appendChild(lbl);
      }
      wrapper.appendChild(div);
    } else if (type === "bvec3") {
      let div = document.createElement("div"); div.style.display = "flex"; div.style.gap = "8px";
      let v = get();
      for (let i = 0; i < 3; i++) {
        let cb = document.createElement("input"); cb.type = "checkbox";
        cb.checked = v[["x","y","z"][i]];
        cb.onchange = () => set(new THREE.Vector3(div.children[0].checked, div.children[1].checked, div.children[2].checked));
        let lbl = document.createElement("label"); lbl.appendChild(cb); lbl.append(["x","y","z"][i]);
        div.appendChild(lbl);
      }
      wrapper.appendChild(div);
    } else if (type === "bvec4") {
      let div = document.createElement("div"); div.style.display = "flex"; div.style.gap = "8px";
      let v = get();
      for (let i = 0; i < 4; i++) {
        let cb = document.createElement("input"); cb.type = "checkbox";
        cb.checked = v[["x","y","z","w"][i]];
        cb.onchange = () => set(new THREE.Vector4(div.children[0].checked, div.children[1].checked, div.children[2].checked, div.children[3].checked));
        let lbl = document.createElement("label"); lbl.appendChild(cb); lbl.append(["x","y","z","w"][i]);
        div.appendChild(lbl);
      }
      wrapper.appendChild(div);
    } else if (type.startsWith("mat")) {
      let rows, cols;
      if (type === "mat2") { rows=2; cols=2; }
      else if (type === "mat3") { rows=3; cols=3; }
      else if (type === "mat4") { rows=4; cols=4; }
      else if (type === "mat2x3") { rows=2; cols=3; }
      else if (type === "mat2x4") { rows=2; cols=4; }
      else if (type === "mat3x2") { rows=3; cols=2; }
      else if (type === "mat3x4") { rows=3; cols=4; }
      else if (type === "mat4x2") { rows=4; cols=2; }
      else if (type === "mat4x3") { rows=4; cols=3; }
      let div = document.createElement("div");
      div.style.display = "grid";
      div.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
      div.style.gap = "4px";
      let mat = get();
      let elems = mat.elements || Array(rows*cols).fill(0);
      let inputs = [];
      for (let i = 0; i < rows*cols; i++) {
        let inp = document.createElement("input"); inp.type = "number"; inp.step = "any"; inp.value = elems[i];
        inp.oninput = () => {
          let vals = inputs.map(i => parseFloat(i.value));
          let newMat;
          if (rows===2 && cols===2) newMat = new THREE.Matrix2().set(vals[0], vals[1], vals[2], vals[3]);
          else if (rows===3 && cols===3) newMat = new THREE.Matrix3().set(vals[0], vals[1], vals[2], vals[3], vals[4], vals[5], vals[6], vals[7], vals[8]);
          else newMat = new THREE.Matrix4().set(vals[0], vals[1], vals[2], vals[3], vals[4], vals[5], vals[6], vals[7], vals[8], vals[9], vals[10], vals[11], vals[12], vals[13], vals[14], vals[15]);
          set(newMat);
        };
        inputs.push(inp);
        div.appendChild(inp);
      }
      wrapper.appendChild(div);
    } else if (type === "sampler2D") {
      let fileInput = document.createElement("input");
      fileInput.type = "file"; fileInput.accept = "image/*";
      fileInput.onchange = (e) => {
        let file = e.target.files[0];
        if (file) {
          let img = new Image();
          img.onload = () => {
            let tex = new THREE.Texture(img);
            tex.needsUpdate = true;
            set(tex);
          };
          img.src = URL.createObjectURL(file);
        }
      };
      wrapper.appendChild(fileInput);
    }
    return wrapper;
  })();

  row.appendChild(control);
  container.appendChild(row);
}

const controls = new OrbitControls(camera,renderer.domElement);
const update = (time) => {
  cube.material.uniforms.iTime.value = time*0.001;
  renderer.render(scene,camera);
  requestAnimationFrame(update);
}
update(0);
  
</script>
