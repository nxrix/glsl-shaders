---
layout: default
---

<canvas id="canvas"></canvas>
<div id="uniforms"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
</script>
<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

canvas.width = canvas.height = 512;

const renderer = new THREE.WebGLRenderer({ canvas, context: canvas.getContext("webgl2",{ antialias: false, preserveDrawingBuffer: true }) });
renderer.setSize(canvas.width,canvas.height,true);
renderer.setPixelRatio(1);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

const camera = new THREE.PerspectiveCamera(90,canvas.width/canvas.height,0.125,256);
camera.position.set(0,0,2);
const scene = new THREE.Scene();

const vs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
void main() {
  vP = position;
  vN = normal;
  vW = (modelMatrix*vec4(position,1)).xyz;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1);
}`;

const glsl = `
uniform float iTime;
uniform float iA;
uniform int iB;
uniform vec3 iC;
struct light {
  vec3 p;
  float i;
  float w[4];
};
uniform light iL;
uniform light iLs[2];

void mainCube(out vec4 col, vec3 ro, vec3 rd) { 
  col = vec4(rd+iA+float(iB)+iC+iL.p+iLs[0].p,1);
}
`;

const fs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
${glsl}
void main() {
  vec3 ro = cameraPosition;
  vec3 rd = normalize(vW-ro);
  mainCube(gl_FragColor,ro,rd);
}`;

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.ShaderMaterial({
    vertexShader: vs,
    fragmentShader: fs,
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      iTime: { value: 0 }
    }
  })
);
scene.add(cube);

const gl = renderer.getContext();

const vss = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vss,`#version 300 es
  void main() { gl_Position = vec4(0); }
`);
gl.compileShader(vss);
  
const fss = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fss,`#version 300 es
  precision highp float;
  ${glsl}
  out vec4 fragColor;
  void main() {
    mainCube(fragColor,vec3(0),vec3(0));
  }
`);
gl.compileShader(fss);

const program = gl.createProgram();
gl.attachShader(program,vss);
gl.attachShader(program,fss);
gl.linkProgram(program);

const uniformCount = gl.getProgramParameter(program,gl.ACTIVE_UNIFORMS);
const uniformList = [];
for (let i = 0; i < uniformCount; i++) {
  const info = gl.getActiveUniform(program,i);
  uniformList.push({
    name: info.name,
    type: info.type,
    size: info.size
  });
}

(function() {
  const container = document.getElementById('uniforms');
  if (!container) return;
  container.innerHTML = '';

  // Type info mapping (GLenum -> UI behavior)
  const TYPE_MAP = {
    [gl.FLOAT]:         { js: 'float', ui: 'float', ctor: (v) => parseFloat(v) },
    [gl.FLOAT_VEC2]:    { js: 'vec2',  ui: 'vec2',  ctor: (arr) => new THREE.Vector2(arr[0], arr[1]) },
    [gl.FLOAT_VEC3]:    { js: 'vec3',  ui: 'vec3',  ctor: (arr) => new THREE.Vector3(arr[0], arr[1], arr[2]) },
    [gl.FLOAT_VEC4]:    { js: 'vec4',  ui: 'vec4',  ctor: (arr) => new THREE.Vector4(arr[0], arr[1], arr[2], arr[3]) },
    [gl.INT]:           { js: 'int',   ui: 'int',   ctor: (v) => parseInt(v, 10) },
    [gl.INT_VEC2]:      { js: 'ivec2', ui: 'ivec2', ctor: (arr) => [parseInt(arr[0],10), parseInt(arr[1],10)] },
    [gl.INT_VEC3]:      { js: 'ivec3', ui: 'ivec3', ctor: (arr) => [parseInt(arr[0],10), parseInt(arr[1],10), parseInt(arr[2],10)] },
    [gl.INT_VEC4]:      { js: 'ivec4', ui: 'ivec4', ctor: (arr) => [parseInt(arr[0],10), parseInt(arr[1],10), parseInt(arr[2],10), parseInt(arr[3],10)] },
    [gl.UNSIGNED_INT]:  { js: 'uint',  ui: 'uint',  ctor: (v) => parseInt(v, 10) },
    [gl.UNSIGNED_INT_VEC2]: { js:'uvec2', ui:'uvec2', ctor:(arr)=>[parseInt(arr[0],10), parseInt(arr[1],10)] },
    [gl.UNSIGNED_INT_VEC3]: { js:'uvec3', ui:'uvec3', ctor:(arr)=>[parseInt(arr[0],10), parseInt(arr[1],10), parseInt(arr[2],10)] },
    [gl.UNSIGNED_INT_VEC4]: { js:'uvec4', ui:'uvec4', ctor:(arr)=>[parseInt(arr[0],10), parseInt(arr[1],10), parseInt(arr[2],10), parseInt(arr[3],10)] },
    [gl.BOOL]:          { js: 'bool',  ui: 'bool',  ctor: (v) => !!v },
    [gl.BOOL_VEC2]:     { js: 'bvec2', ui: 'bvec2', ctor: (arr) => [!!arr[0], !!arr[1]] },
    [gl.BOOL_VEC3]:     { js: 'bvec3', ui: 'bvec3', ctor: (arr) => [!!arr[0], !!arr[1], !!arr[2]] },
    [gl.BOOL_VEC4]:     { js: 'bvec4', ui: 'bvec4', ctor: (arr) => [!!arr[0], !!arr[1], !!arr[2], !!arr[3]] },
    [gl.FLOAT_MAT2]:    { js: 'mat2',  ui: 'mat2',  rows:2, cols:2, ctor: (arr) => new THREE.Matrix2().set(...arr) },
    [gl.FLOAT_MAT3]:    { js: 'mat3',  ui: 'mat3',  rows:3, cols:3, ctor: (arr) => new THREE.Matrix3().set(...arr) },
    [gl.FLOAT_MAT4]:    { js: 'mat4',  ui: 'mat4',  rows:4, cols:4, ctor: (arr) => new THREE.Matrix4().set(...arr) },
    [gl.FLOAT_MAT2x3]:  { js: 'mat2x3',ui: 'mat2x3',rows:2,cols:3, ctor: (arr) => arr },
    [gl.FLOAT_MAT2x4]:  { js: 'mat2x4',ui: 'mat2x4',rows:2,cols:4, ctor: (arr) => arr },
    [gl.FLOAT_MAT3x2]:  { js: 'mat3x2',ui: 'mat3x2',rows:3,cols:2, ctor: (arr) => arr },
    [gl.FLOAT_MAT3x4]:  { js: 'mat3x4',ui: 'mat3x4',rows:3,cols:4, ctor: (arr) => arr },
    [gl.FLOAT_MAT4x2]:  { js: 'mat4x2',ui: 'mat4x2',rows:4,cols:2, ctor: (arr) => arr },
    [gl.FLOAT_MAT4x3]:  { js: 'mat4x3',ui: 'mat4x3',rows:4,cols:3, ctor: (arr) => arr },
    [gl.SAMPLER_2D]:    { js: 'sampler2D', ui: 'texture', ctor: (img) => new THREE.Texture(img) }
  };

  // Parse uniform name into path segments (strings for fields, numbers for array indices)
  function parsePath(name) {
    const parts = [];
    let current = '';
    for (let i = 0; i < name.length; i++) {
      const ch = name[i];
      if (ch === '.') {
        if (current) parts.push(current);
        current = '';
      } else if (ch === '[') {
        if (current) parts.push(current);
        current = '';
        let j = i+1;
        while (j < name.length && name[j] !== ']') j++;
        const idx = parseInt(name.slice(i+1, j), 10);
        parts.push(idx);
        i = j;
        current = '';
      } else {
        current += ch;
      }
    }
    if (current) parts.push(current);
    return parts;
  }

  // Build tree from flat uniform list
  function buildTree(uniforms) {
    const root = { children: new Map(), isArray: false, typeInfo: null, uniformItem: null };
    for (const item of uniforms) {
      const path = parsePath(item.name);
      let node = root;
      for (let i = 0; i < path.length; i++) {
        const seg = path[i];
        const isLast = (i === path.length-1);
        if (!node.children.has(seg)) {
          const childNode = {
            name: seg,
            children: new Map(),
            isArray: (typeof seg === 'number'),
            typeInfo: null,
            uniformItem: null,
            parent: node,
            arraySize: 1
          };
          node.children.set(seg, childNode);
        }
        node = node.children.get(seg);
        if (isLast) {
          node.uniformItem = item;
          node.typeInfo = TYPE_MAP[item.type];
          // For array elements, propagate size info upward
          if (typeof seg === 'number' && node.parent && !node.parent.arraySize) {
            node.parent.arraySize = item.size;
            node.parent.isArray = true;
          }
        }
      }
    }
    // Post-process: for array nodes without explicit size, derive from children
    function fixArraySizes(node) {
      if (node.isArray && !node.arraySize && node.children.size > 0) {
        const indices = Array.from(node.children.keys()).filter(k => typeof k === 'number');
        if (indices.length) node.arraySize = Math.max(...indices) + 1;
      }
      for (let child of node.children.values()) fixArraySizes(child);
    }
    fixArraySizes(root);
    return root;
  }

  // Recursively create UI
  function buildUI(node, parentEl, path = [], isArrayElement = false) {
    // Sort children: numbers (indices) first then strings, but keep numeric order
    const sortedKeys = Array.from(node.children.keys()).sort((a,b) => {
      if (typeof a === 'number' && typeof b === 'number') return a - b;
      if (typeof a === 'number') return -1;
      if (typeof b === 'number') return 1;
      return String(a).localeCompare(String(b));
    });

    for (const key of sortedKeys) {
      const child = node.children.get(key);
      const fullPath = [...path, key];
      const flatName = fullPath.join('.').replace(/\.(\d+)/g, '[$1]'); // for display

      // Determine if this node is an array (multiple numeric children)
      const isArrayNode = child.isArray && child.arraySize > 1;
      const isStructNode = !child.uniformItem && child.children.size > 0 && !isArrayNode;

      if (isArrayNode) {
        // Create a collapsible section for the whole array
        const details = document.createElement('details');
        details.style.marginLeft = '1rem';
        const summary = document.createElement('summary');
        summary.textContent = `${key} (array[${child.arraySize}])`;
        summary.style.fontWeight = 'bold';
        summary.style.cursor = 'pointer';
        details.appendChild(summary);
        const groupDiv = document.createElement('div');
        groupDiv.style.marginLeft = '1rem';
        groupDiv.style.borderLeft = '1px solid #ccc';
        groupDiv.style.paddingLeft = '0.5rem';
        details.appendChild(groupDiv);
        parentEl.appendChild(details);
        // Render each array element as a sub-details
        for (let idx = 0; idx < child.arraySize; idx++) {
          const elemNode = child.children.get(idx);
          if (!elemNode) continue;
          const elemDetails = document.createElement('details');
          elemDetails.style.marginLeft = '0.5rem';
          const elemSummary = document.createElement('summary');
          elemSummary.textContent = `[${idx}]`;
          elemSummary.style.cursor = 'pointer';
          elemDetails.appendChild(elemSummary);
          const elemDiv = document.createElement('div');
          elemDiv.style.marginLeft = '1rem';
          elemDetails.appendChild(elemDiv);
          groupDiv.appendChild(elemDetails);
          buildUI(elemNode, elemDiv, fullPath, true);
        }
      } 
      else if (isStructNode) {
        // Struct (non-array object)
        const details = document.createElement('details');
        details.style.marginLeft = '1rem';
        const summary = document.createElement('summary');
        summary.textContent = key;
        summary.style.fontWeight = 'bold';
        summary.style.cursor = 'pointer';
        details.appendChild(summary);
        const groupDiv = document.createElement('div');
        groupDiv.style.marginLeft = '1rem';
        groupDiv.style.borderLeft = '1px solid #ccc';
        groupDiv.style.paddingLeft = '0.5rem';
        details.appendChild(groupDiv);
        parentEl.appendChild(details);
        buildUI(child, groupDiv, fullPath);
      }
      else if (child.uniformItem) {
        // Leaf uniform - generate input controls
        const item = child.uniformItem;
        const typeInfo = child.typeInfo;
        if (!typeInfo) {
          console.warn(`Unknown type for ${flatName}`);
          continue;
        }

        // Ensure uniform exists in material with default value
        if (!cube.material.uniforms[flatName]) {
          let defaultValue;
          if (typeInfo.ui === 'texture') {
            defaultValue = new THREE.Texture();
          } else if (typeInfo.ui.startsWith('mat')) {
            const size = typeInfo.rows * typeInfo.cols;
            defaultValue = typeInfo.ctor(new Array(size).fill(0));
          } else if (typeInfo.ui === 'vec2') defaultValue = new THREE.Vector2(0,0);
          else if (typeInfo.ui === 'vec3') defaultValue = new THREE.Vector3(0,0,0);
          else if (typeInfo.ui === 'vec4') defaultValue = new THREE.Vector4(0,0,0,0);
          else if (typeInfo.ui === 'int' || typeInfo.ui === 'uint') defaultValue = 0;
          else if (typeInfo.ui === 'float') defaultValue = 0.0;
          else if (typeInfo.ui === 'bool') defaultValue = false;
          else if (typeInfo.ui === 'ivec2') defaultValue = [0,0];
          else if (typeInfo.ui === 'ivec3') defaultValue = [0,0,0];
          else if (typeInfo.ui === 'ivec4') defaultValue = [0,0,0,0];
          else if (typeInfo.ui === 'uvec2') defaultValue = [0,0];
          else if (typeInfo.ui === 'uvec3') defaultValue = [0,0,0];
          else if (typeInfo.ui === 'uvec4') defaultValue = [0,0,0,0];
          else if (typeInfo.ui === 'bvec2') defaultValue = [false,false];
          else if (typeInfo.ui === 'bvec3') defaultValue = [false,false,false];
          else if (typeInfo.ui === 'bvec4') defaultValue = [false,false,false,false];
          else defaultValue = null;
          cube.material.uniforms[flatName] = { value: defaultValue };
        }

        const controlRow = document.createElement('div');
        controlRow.style.marginBottom = '0.5rem';
        controlRow.style.display = 'flex';
        controlRow.style.alignItems = 'center';
        controlRow.style.flexWrap = 'wrap';
        controlRow.style.gap = '0.5rem';

        const label = document.createElement('label');
        label.textContent = flatName;
        label.style.fontFamily = 'monospace';
        label.style.fontSize = '12px';
        label.style.minWidth = '150px';
        controlRow.appendChild(label);

        if (typeInfo.ui === 'texture') {
          const fileInput = document.createElement('input');
          fileInput.type = 'file';
          fileInput.accept = 'image/*';
          fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
              const img = new Image();
              img.onload = () => {
                const tex = new THREE.Texture(img);
                tex.needsUpdate = true;
                cube.material.uniforms[flatName].value = tex;
              };
              img.src = URL.createObjectURL(file);
            }
          });
          controlRow.appendChild(fileInput);
        } 
        else if (typeInfo.ui.startsWith('mat')) {
          const rows = typeInfo.rows;
          const cols = typeInfo.cols;
          const table = document.createElement('table');
          table.style.borderCollapse = 'collapse';
          const inputs = [];
          for (let r = 0; r < rows; r++) {
            const tr = document.createElement('tr');
            for (let c = 0; c < cols; c++) {
              const td = document.createElement('td');
              const inp = document.createElement('input');
              inp.type = 'number';
              inp.step = 'any';
              inp.style.width = '60px';
              inp.value = '0';
              inp.addEventListener('input', () => {
                const vals = inputs.map(i => parseFloat(i.value));
                const mat = typeInfo.ctor(vals);
                cube.material.uniforms[flatName].value = mat;
              });
              inputs.push(inp);
              td.appendChild(inp);
              tr.appendChild(td);
            }
            table.appendChild(tr);
          }
          controlRow.appendChild(table);
        }
        else {
          // scalar or vector
          const componentCount = { 'float':1, 'int':1, 'uint':1, 'bool':1,
                                   'vec2':2, 'ivec2':2, 'uvec2':2, 'bvec2':2,
                                   'vec3':3, 'ivec3':3, 'uvec3':3, 'bvec3':3,
                                   'vec4':4, 'ivec4':4, 'uvec4':4, 'bvec4':4 }[typeInfo.ui] || 1;
          const isBool = typeInfo.ui.startsWith('bvec') || typeInfo.ui === 'bool';
          const inputs = [];
          for (let i = 0; i < componentCount; i++) {
            let inp;
            if (isBool) {
              inp = document.createElement('input');
              inp.type = 'checkbox';
              if (cube.material.uniforms[flatName].value && cube.material.uniforms[flatName].value[i] !== undefined)
                inp.checked = cube.material.uniforms[flatName].value[i];
            } else {
              inp = document.createElement('input');
              inp.type = 'number';
              inp.step = typeInfo.ui.includes('int') ? '1' : 'any';
              const curVal = cube.material.uniforms[flatName].value;
              const val = (componentCount === 1) ? curVal : (curVal && curVal[i] !== undefined ? curVal[i] : 0);
              inp.value = val;
            }
            inp.style.width = '60px';
            inputs.push(inp);
            controlRow.appendChild(inp);
          }
          const updateUniform = () => {
            let newVal;
            if (componentCount === 1) {
              newVal = isBool ? inputs[0].checked : (typeInfo.ui.includes('int') ? parseInt(inputs[0].value,10) : parseFloat(inputs[0].value));
            } else {
              const arr = inputs.map(inp => isBool ? inp.checked : (typeInfo.ui.includes('int') ? parseInt(inp.value,10) : parseFloat(inp.value)));
              newVal = typeInfo.ctor(arr);
            }
            cube.material.uniforms[flatName].value = newVal;
          };
          inputs.forEach(inp => inp.addEventListener('input', updateUniform));
        }
        parentEl.appendChild(controlRow);
      }
    }
  }

  const tree = buildTree(uniformList);
  buildUI(tree, container);
})();

const controls = new OrbitControls(camera,renderer.domElement);
const update = (time) => {
  cube.material.uniforms.iTime.value = time*0.001;
  renderer.render(scene,camera);
  requestAnimationFrame(update);
}
update(0);
  
</script>
