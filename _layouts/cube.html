<canvas id="canvas" style="border-radius: 4px;border:1px solid var(--c3)"></canvas>
<div style="margin:8px 0">
  <label for="cameraType">Perspective</label>
  <input type="checkbox" name="cameraType" id="cameraType">
  <br>
  <div id="fovContainer" style="display:none">
    <label for="cameraFov">Field Of View</label>
    <input type="range" name="cameraFov" id="cameraFov" min="30" max="90" step="5" value="45">
  </div>
</div>
<div id="uniforms"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
</script>
<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// Load configuration from Jekyll front matter
const yamlUniforms = {% if page.uniforms %}{{ page.uniforms | jsonify }}{% else %}{}{% endif %};

canvas.width = canvas.height = 512;

const renderer = new THREE.WebGLRenderer({ canvas, context: canvas.getContext("webgl2",{ antialias: false, preserveDrawingBuffer: true }) });
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

const perspectiveCamera = new THREE.PerspectiveCamera(45,1,0.125,256);
const orthographicCamera = new THREE.OrthographicCamera(-2,2,2,-2,-8,256);
perspectiveCamera.position.set(0,0,4);
orthographicCamera.position.set(0,0,4);
let camera = orthographicCamera;

const scene = new THREE.Scene();

const vs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
varying mat4 vM;
void main() {
  vP = position;
  vN = normal;
  vW = (modelMatrix*vec4(position,1)).xyz;
  vM = projectionMatrix*modelViewMatrix;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1);
}`;

const glsl = `
uniform float iTime;
{{ content }}
`;

const fs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
varying mat4 vM;
uniform bool iPerspective;
${glsl}
void main() {
  vec3 ro = cameraPosition;
  vec3 rd;
  if (iPerspective) {
    rd = normalize(vW-ro);
  } else {
    ro = vW;
    rd = normalize(vec3(vM[0][2],vM[1][2],vM[2][2]));
  }
  mainCube(gl_FragColor,ro,rd);
}`;

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(2,2,2),
  new THREE.ShaderMaterial({
    vertexShader: vs,
    fragmentShader: fs,
    side: THREE.DoubleSide,
    uniforms: {
      iTime: { value: 0 },
      iPerspective: { value: false }
    }
  })
);
scene.add(cube);

let needsRender = true;

const cameraResize = (w,h,r=1) => {
  renderer.setSize(w,h,true);
  renderer.setPixelRatio(r);
  
  const aspect = w/h;

  perspectiveCamera.aspect = aspect;
  perspectiveCamera.zoom = aspect<=1?aspect:1;
  perspectiveCamera.updateProjectionMatrix();

  if (aspect<=1) {
    const visibleHeight = orthographicCamera.left - orthographicCamera.right;
    orthographicCamera.top = -visibleHeight/aspect/2;
    orthographicCamera.bottom = visibleHeight/aspect/2;
  } else {
    const visibleHeight = orthographicCamera.top - orthographicCamera.bottom;
    orthographicCamera.left = -visibleHeight*aspect/2;
    orthographicCamera.right = visibleHeight*aspect/2;
  }
  orthographicCamera.updateProjectionMatrix();

  //renderer.render(scene,camera);
  needsRender = true;
}
const cameraResizeEvent = () => {
  const z = Math.min(window.innerWidth-45,512);
  cameraResize(z,z,window.devicePixelRatio);
}
window.addEventListener("resize",cameraResizeEvent);
cameraResizeEvent();

cameraFov.addEventListener("input",() => {
  perspectiveCamera.fov = cameraFov.value;
  perspectiveCamera.updateProjectionMatrix();
  needsRender = true;
});

cameraType.addEventListener("change", () => {
  fovContainer.style.display = cameraType.checked?"block":"none";

  const target = controls.target.clone();
  const position = camera.position.clone();

  const aspect = canvas.width / canvas.height;
  const halfFovRad = perspectiveCamera.fov * Math.PI / 360;
  if (cameraType.checked) {
    const visibleHeight = (aspect<=1?(orthographicCamera.right-orthographicCamera.left):(orthographicCamera.top-orthographicCamera.bottom))/orthographicCamera.zoom;
    const newDistance = visibleHeight / (2 * Math.tan(halfFovRad));
    const direction = new THREE.Vector3().subVectors(position,target).normalize();
    const newPosition = target.clone().add(direction.multiplyScalar(newDistance));
    perspectiveCamera.position.copy(newPosition);
    perspectiveCamera.updateProjectionMatrix();

    camera = perspectiveCamera;
    cube.material.uniforms.iPerspective.value = true;
  } else {
    const distance = position.distanceTo(target);
    const visibleHeight = 2 * distance * Math.tan(halfFovRad);

    orthographicCamera.position.copy(position);
    if (aspect<=1) {
      orthographicCamera.top = visibleHeight/aspect/2;
      orthographicCamera.bottom = -visibleHeight/aspect/2;
      orthographicCamera.left = -visibleHeight/2;
      orthographicCamera.right = visibleHeight/2;
    } else {
      orthographicCamera.left = -visibleHeight*aspect/2;
      orthographicCamera.right = visibleHeight*aspect/2;
      orthographicCamera.top = visibleHeight/2;
      orthographicCamera.bottom = -visibleHeight/2;
    }
    orthographicCamera.zoom = 1;
    orthographicCamera.updateProjectionMatrix();

    camera = orthographicCamera;
    cube.material.uniforms.iPerspective.value = false;
  }

  controls.object = camera;
  controls.target.copy(target);
  controls.update();
  needsRender = true;
});

const gl = renderer.getContext();

const vss = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vss,"#version 300 es\nvoid main() { gl_Position = vec4(0); }");
gl.compileShader(vss);
  
const fss = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fss,`#version 300 es
  precision highp float;
  ${glsl}
  out vec4 fragColor;
  void main() {
    mainCube(fragColor,vec3(0),vec3(0));
  }
`);
gl.compileShader(fss);

const program = gl.createProgram();
gl.attachShader(program,vss);
gl.attachShader(program,fss);
gl.linkProgram(program);

const uniformCount = gl.getProgramParameter(program,gl.ACTIVE_UNIFORMS);
const uniformList = [];
for (let i = 0; i < uniformCount; i++) {
  const info = gl.getActiveUniform(program,i);
  uniformList.push({
    name: info.name,
    type: info.type,
    size: info.size
  });
}

const TYPES = {
   5126: { name:     "float", size:  1, init: () => 0, inputs: 1, step: 0.01 },
  35664: { name:      "vec2", size:  2, init: () => new THREE.Vector2(0,0), inputs: 2, step: 0.01 },
  35665: { name:      "vec3", size:  3, init: () => new THREE.Vector3(0,0,0), inputs: 3, step: 0.01 },
  35666: { name:      "vec4", size:  4, init: () => new THREE.Vector4(0,0,0,0), inputs: 4, step: 0.01 },
   5124: { name:       "int", size:  1, init: () => 0, inputs: 1, step: 1 },
  35667: { name:     "ivec2", size:  2, init: () => [0, 0], inputs: 2, step: 1 },
  35668: { name:     "ivec3", size:  3, init: () => [0, 0, 0], inputs: 3, step: 1 },
  35669: { name:     "ivec4", size:  4, init: () => [0, 0, 0, 0], inputs: 4, step: 1 },
   5125: { name:      "uint", size:  1, init: () => 0, inputs: 1, step: 1, min: 0 },
  36294: { name:     "uvec2", size:  2, init: () => [0, 0], inputs: 2, step: 1, min: 0 },
  36295: { name:     "uvec3", size:  3, init: () => [0, 0, 0], inputs: 3, step: 1, min: 0 },
  36296: { name:     "uvec4", size:  4, init: () => [0, 0, 0, 0], inputs: 4, step: 1, min: 0 },
  35670: { name:      "bool", size:  1, init: () => false, inputs: 1, type: "checkbox" },
  35671: { name:     "bvec2", size:  2, init: () => [false, false], inputs: 2, type: "checkbox" },
  35672: { name:     "bvec3", size:  3, init: () => [false, false, false], inputs: 3, type: "checkbox" },
  35673: { name:     "bvec4", size:  4, init: () => [false, false, false], inputs: 4, type: "checkbox" },
  35674: { name:      "mat2", size:  4, init: () => [1, 0, 0, 1], inputs: 4, cols: 2, rows: 2, step: 0.01 },
  35675: { name:      "mat3", size:  9, init: () => new THREE.Matrix3(), inputs: 9, cols: 3, rows: 3, step: 0.01 },
  35676: { name:      "mat4", size: 16, init: () => new THREE.Matrix4(), inputs: 16, cols: 4, rows: 4, step: 0.01 },
  35685: { name:    "mat2x3", size:  6, init: () => new Float32Array(6), inputs: 6, cols: 2, rows: 3, step: 0.01 },
  35686: { name:    "mat2x4", size:  8, init: () => new Float32Array(8), inputs: 8, cols: 2, rows: 4, step: 0.01 },
  35687: { name:    "mat3x2", size:  6, init: () => new Float32Array(6), inputs: 6, cols: 3, rows: 2, step: 0.01 },
  35688: { name:    "mat3x4", size: 12, init: () => new Float32Array(12), inputs: 12, cols: 3, rows: 4, step: 0.01 },
  35689: { name:    "mat4x2", size:  8, init: () => new Float32Array(8), inputs: 8, cols: 4, rows: 2, step: 0.01 },
  35690: { name:    "mat4x3", size: 12, init: () => new Float32Array(12), inputs: 12, cols: 4, rows: 3, step: 0.01 },
  35678: { name: "sampler2D", size:  1, init: () => new THREE.Texture(), type: "file" }
};

uniformList.sort((a, b) => {
  const getPos = (name) => {
    const parts = name.split(".");
    const base = parts[0].split("[")[0];
    const baseIdx = glsl.search(new RegExp("\\b" + base + "\\b"));
    if (parts.length > 1) {
      const field = parts[1].split("[")[0];
      const fieldIdx = glsl.indexOf(field);
      return baseIdx + fieldIdx * 1e-6;
    }
    return baseIdx;
  };
  return getPos(a.name) - getPos(b.name);
});

const parsePath = (name, size) => {
  const parts = name.split(".");
  const path = [];
  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    const match = part.match(/^(\w+)(?:\[(\d+)\])?$/);
    if (match) {
      path.push(match[1]);
      if (match[2] !== undefined) {
        if (i === parts.length - 1 && size > 1) {
        } else {
          path.push(parseInt(match[2], 10));
        }
      }
    }
  }
  return path;
};

const getThreePath = (path) => {
  const threePath = [...path];
  threePath.splice(1, 0, "value");
  return threePath;
};

// Traverses front-matter configuration using numerical index overrides and fallbacks
const getYamlNode = (path) => {
  if (!yamlUniforms) return null;
  let curr = yamlUniforms;
  for (let i = 0; i < path.length; i++) {
    const key = path[i];
    if (curr === null || curr === undefined || typeof curr !== "object") {
      return null;
    }
    if (typeof key === "number") {
      // Look for explicit index array override
      if (curr[key] !== undefined) {
        curr = curr[key];
      } else if (curr[key.toString()] !== undefined) {
        curr = curr[key.toString()];
      } else {
        // Fallback: skip indexing and look for properties directly on the parent
        continue;
      }
    } else {
      if (curr[key] !== undefined) {
        curr = curr[key];
      } else {
        return null;
      }
    }
  }
  return curr;
};

// Extracts metadata values for multidimensional array dimensions and vectors/matrices
const extractScalar = (val, N, C, arrayIndex, componentIndex) => {
  if (val === undefined || val === null) return undefined;
  if (!Array.isArray(val)) return val;

  // Handle nested arrays (e.g. [[1, 2, 3], [4, 5, 6]])
  if (Array.isArray(val[0])) {
    const arr = val[arrayIndex % val.length];
    if (Array.isArray(arr)) {
      return arr[componentIndex % arr.length];
    }
    return arr;
  }

  // Handle flat arrays based on layout type context
  if (N > 1 && C > 1) {
    if (val.length === N * C) return val[arrayIndex * C + componentIndex];
    if (val.length === C) return val[componentIndex];
    if (val.length === N) return val[arrayIndex];
    return val[(arrayIndex * C + componentIndex) % val.length];
  } else if (N > 1) {
    return val[arrayIndex % val.length];
  } else if (C > 1) {
    return val[componentIndex % val.length];
  }
  return val[0];
};

const resolveField = (metaObj, fieldName, arrayIndex, componentIndex, totalComponents, defaultValue, size) => {
  if (!metaObj) return defaultValue;
  let val = metaObj[fieldName];
  if (val === undefined) {
    return defaultValue;
  }
  const N = size || 1;
  const C = totalComponents;
  const res = extractScalar(val, N, C, arrayIndex, componentIndex);
  return res !== undefined ? res : defaultValue;
};

const getInitialValueForUniform = (path, item) => {
  const typeInfo = TYPES[item.type];
  if (!typeInfo) return 0;
  
  const N = item.size;
  const C = typeInfo.inputs || 1;
  const yamlNode = getYamlNode(path);
  
  const resolveScalar = (arrIdx, compIdx, def) => {
    return resolveField(yamlNode, "value", arrIdx, compIdx, C, def, N);
  };

  const buildElement = (arrIdx) => {
    if (item.type === 35678) { // sampler2D
      return typeInfo.init();
    }
    if (typeInfo.name === "float" || typeInfo.name === "int" || typeInfo.name === "uint") {
      return resolveScalar(arrIdx, 0, 0);
    }
    if (typeInfo.name === "bool") {
      return resolveScalar(arrIdx, 0, false);
    }
    if (typeInfo.name.startsWith("vec")) {
      const coords = [];
      for (let c = 0; c < C; c++) {
        coords.push(resolveScalar(arrIdx, c, 0));
      }
      if (typeInfo.name === "vec2") return new THREE.Vector2(coords[0], coords[1]);
      if (typeInfo.name === "vec3") return new THREE.Vector3(coords[0], coords[1], coords[2]);
      if (typeInfo.name === "vec4") return new THREE.Vector4(coords[0], coords[1], coords[2], coords[3]);
    }
    if (typeInfo.name.startsWith("ivec") || typeInfo.name.startsWith("uvec")) {
      const coords = [];
      for (let c = 0; c < C; c++) {
        coords.push(resolveScalar(arrIdx, c, 0));
      }
      return coords;
    }
    if (typeInfo.name.startsWith("bvec")) {
      const coords = [];
      for (let c = 0; c < C; c++) {
        coords.push(resolveScalar(arrIdx, c, false));
      }
      return coords;
    }
    if (typeInfo.name.startsWith("mat")) {
      const total = typeInfo.cols * typeInfo.rows;
      const elements = [];
      for (let c = 0; c < total; c++) {
        const isIdentityIndex = (c % (typeInfo.cols + 1) === 0);
        const defVal = (typeInfo.name.startsWith("mat") && !typeInfo.name.includes("x") && isIdentityIndex) ? 1 : 0;
        elements.push(resolveScalar(arrIdx, c, defVal));
      }
      if (typeInfo.name === "mat3") {
        const m = new THREE.Matrix3();
        m.set(...elements);
        return m;
      }
      if (typeInfo.name === "mat4") {
        const m = new THREE.Matrix4();
        m.set(...elements);
        return m;
      }
      return new Float32Array(elements);
    }
    return typeInfo.init();
  };
  
  if (N > 1) {
    const arr = [];
    for (let s = 0; s < N; s++) {
      arr.push(buildElement(s));
    }
    return arr;
  } else {
    return buildElement(0);
  }
};

const setPathValue = (obj, path, val) => {
  let curr = obj;
  for (let i = 0; i < path.length - 1; i++) {
    const key = path[i];
    const nextKey = path[i + 1];
    if (curr[key] === undefined) {
      curr[key] = (typeof nextKey === "number") ? [] : {};
    }
    curr = curr[key];
  }
  curr[path[path.length - 1]] = val;
};

const getPathValue = (obj, path) => {
  return path.reduce((curr, key) => curr[key], obj);
};

const updateUniformValue = (threePath, arrayIndex, componentIndex, val) => {
  const parentPath = threePath.slice(0, -1);
  const lastKey = threePath[threePath.length - 1];
  const parentObj = getPathValue(cube.material.uniforms, parentPath);
  let target = parentObj[lastKey];
  
  if (Array.isArray(target) && target.length > 0) {
    const firstElem = target[0];
    const isPrimitiveArray = (typeof firstElem === "number" || typeof firstElem === "boolean" || Array.isArray(firstElem));
    if (isPrimitiveArray) {
      if (Array.isArray(firstElem)) {
        target[arrayIndex][componentIndex] = val;
      } else {
        target[arrayIndex] = val;
      }
    } else {
      const obj = target[arrayIndex];
      if (obj instanceof THREE.Vector2 || obj instanceof THREE.Vector3 || obj instanceof THREE.Vector4) {
        obj.setComponent(componentIndex, val);
      } else if (obj instanceof THREE.Matrix3 || obj instanceof THREE.Matrix4) {
        obj.elements[componentIndex] = val;
      }
    }
  } else {
    if (target instanceof THREE.Vector2 || target instanceof THREE.Vector3 || target instanceof THREE.Vector4) {
      target.setComponent(componentIndex, val);
    } else if (target instanceof THREE.Matrix3 || target instanceof THREE.Matrix4) {
      target.elements[componentIndex] = val;
    } else if (Array.isArray(target) || ArrayBuffer.isView(target)) {
      target[componentIndex] = val;
    } else {
      parentObj[lastKey] = val;
    }
  }
  needsRender = true;
};

const tree = {};
uniformList.forEach(item => {
  const path = parsePath(item.name, item.size);
  const threePath = getThreePath(path);
  setPathValue(cube.material.uniforms, threePath, getInitialValueForUniform(path, item));
  let curr = tree;
  path.forEach((key, idx) => {
    const isLast = idx === path.length - 1;
    if (!curr[key]) {
      curr[key] = isLast ? { isLeaf: true, item, path } : { children: {} };
    }
    if (!isLast) {
      curr = curr[key].children;
    }
  });
});

const createNumberControl = (initialVal, minVal, maxVal, stepVal, isRange, onChange) => {
  const container = document.createElement("div");
  container.style.display = "flex";
  container.style.alignItems = "center";
  container.style.gap = "8px";
  container.style.width = "100%";
  container.style.maxWidth = "300px";
  
  const numInput = document.createElement("input");
  numInput.type = "number";
  numInput.step = stepVal;
  if (minVal !== undefined) numInput.min = minVal;
  if (maxVal !== undefined) numInput.max = maxVal;
  numInput.value = initialVal;
  numInput.style.width = "65px";
  numInput.style.textAlign = "center";
  container.appendChild(numInput);
  
  if (isRange) {
    const slider = document.createElement("input");
    slider.type = "range";
    slider.min = minVal;
    slider.max = maxVal;
    slider.step = stepVal;
    slider.value = initialVal;
    slider.style.flex = "1";
    slider.style.minWidth = "100px";
    
    slider.addEventListener("input", (e) => {
      numInput.value = e.target.value;
      onChange(parseFloat(e.target.value) || 0);
    });
    
    numInput.addEventListener("input", (e) => {
      slider.value = e.target.value;
      onChange(Math.min(Math.max(parseFloat(e.target.value) || 0,minVal),maxVal));
    });
    
    container.appendChild(slider);
  } else {
    numInput.addEventListener("input", (e) => {
      onChange(Math.min(Math.max(parseFloat(e.target.value) || 0,minVal),maxVal));
    });
  }
  return container;
};

const renderLeaf = (item, path, container) => {
  const typeInfo = TYPES[item.type];
  if (!typeInfo) return;
  
  const renderSingle = (indexOffset, labelText, containerEl) => {
    const wrapper = document.createElement("div");
    wrapper.style.margin = "4px 0";
    wrapper.style.display = "flex";
    wrapper.style.flexDirection = "column";
    wrapper.style.gap = "2px";
    
    if (labelText) {
      const label = document.createElement("label");
      label.textContent = labelText;
      label.style.fontWeight = "bold";
      label.style.fontSize = "12px";
      wrapper.appendChild(label);
    }
    
    const inputRow = document.createElement("div");
    inputRow.style.display = "flex";
    inputRow.style.gap = "4px";
    inputRow.style.flexDirection = "column";
    
    const threePath = getThreePath(path);
    const yamlNode = getYamlNode(path);
    
    const getMetaValue = (fieldName, arrayIndex, componentIndex, defaultValue) => {
      return resolveField(yamlNode, fieldName, arrayIndex, componentIndex, typeInfo.inputs || 1, defaultValue, item.size);
    };
    
    if (typeInfo.type === "file") {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const tex = new THREE.Texture(img);
              tex.needsUpdate = true;
              updateUniformValue(threePath, indexOffset, 0, tex);
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      });
      inputRow.appendChild(input);
    } else if (typeInfo.type === "checkbox") {
      const count = typeInfo.inputs;
      const checkRow = document.createElement("div");
      checkRow.style.display = "flex";
      checkRow.style.gap = "4px";
      for (let i = 0; i < count; i++) {
        const input = document.createElement("input");
        input.type = "checkbox";
        const initVal = getMetaValue("value", indexOffset, i, false);
        input.checked = initVal;
        input.addEventListener("change", (e) => {
          updateUniformValue(threePath, indexOffset, i, e.target.checked);
        });
        checkRow.appendChild(input);
      }
      inputRow.appendChild(checkRow);
    } else if (typeInfo.cols && typeInfo.rows) {
      const grid = document.createElement("div");
      grid.style.display = "grid";
      grid.style.gridTemplateColumns = "repeat(" + typeInfo.cols + ", 1fr)";
      grid.style.gap = "4px";
      const total = typeInfo.cols * typeInfo.rows;
      for (let i = 0; i < total; i++) {
        const isIdentityIndex = (i % (typeInfo.cols + 1) === 0);
        const defVal = (typeInfo.name.startsWith("mat") && !typeInfo.name.includes("x") && isIdentityIndex) ? 1 : 0;
        
        const initVal = getMetaValue("value", indexOffset, i, defVal);
        const minVal = getMetaValue("min", indexOffset, i, undefined);
        const maxVal = getMetaValue("max", indexOffset, i, undefined);
        const stepVal = getMetaValue("step", indexOffset, i, typeInfo.step || 0.01);
        const isRange = getMetaValue("range", indexOffset, i, false);
        
        const resolvedMin = minVal !== undefined ? minVal : 0;
        const resolvedMax = maxVal !== undefined ? maxVal : Math.max(1.0, initVal * 2);
        
        const control = createNumberControl(initVal, resolvedMin, resolvedMax, stepVal, isRange, (val) => {
          updateUniformValue(threePath, indexOffset, i, val);
        });
        grid.appendChild(control);
      }
      inputRow.appendChild(grid);
    } else {
      const count = typeInfo.inputs;
      const numCol = document.createElement("div");
      numCol.style.display = "flex";
      numCol.style.flexDirection = "column";
      numCol.style.gap = "4px";
      for (let i = 0; i < count; i++) {
        const initVal = getMetaValue("value", indexOffset, i, 0);
        const minVal = getMetaValue("min", indexOffset, i, undefined);
        const maxVal = getMetaValue("max", indexOffset, i, undefined);
        const stepVal = getMetaValue("step", indexOffset, i, typeInfo.step || 0.01);
        const isRange = getMetaValue("range", indexOffset, i, false);
        
        const resolvedMin = minVal !== undefined ? minVal : 0;
        const resolvedMax = maxVal !== undefined ? maxVal : Math.max(1.0, initVal * 2);
        
        const control = createNumberControl(initVal, resolvedMin, resolvedMax, stepVal, isRange, (val) => {
          updateUniformValue(threePath, indexOffset, i, val);
        });
        numCol.appendChild(control);
      }
      inputRow.appendChild(numCol);
    }
    wrapper.appendChild(inputRow);
    containerEl.appendChild(wrapper);
  };
  
  const leafLabel = path[path.length - 1];
  if (item.size > 1) {
    const group = document.createElement("div");
    group.style.borderLeft = "2px solid var(--c3)";
    group.style.paddingLeft = "8px";
    group.style.margin = "4px 0";
    const groupLabel = document.createElement("div");
    groupLabel.textContent = leafLabel;
    groupLabel.style.fontWeight = "bold";
    groupLabel.style.fontSize = "13px";
    group.appendChild(groupLabel);
    for (let s = 0; s < item.size; s++) {
      renderSingle(s, "[" + s + "]", group);
    }
    container.appendChild(group);
  } else {
    renderSingle(0, leafLabel, container);
  }
};

const renderNode = (key, node, container) => {
  if (node.isLeaf) {
    renderLeaf(node.item, node.path, container);
  } else {
    const group = document.createElement("div");
    group.style.borderLeft = "2px solid var(--c3)";
    group.style.paddingLeft = "10px";
    group.style.margin = "6px 0";
    const label = document.createElement("div");
    label.textContent = isNaN(key) ? key : "[" + key + "]";
    label.style.fontWeight = "bold";
    group.appendChild(label);
    const childrenContainer = document.createElement("div");
    childrenContainer.style.display = "flex";
    childrenContainer.style.flexDirection = "column";
    childrenContainer.style.gap = "4px";
    group.appendChild(childrenContainer);
    const childKeys = Object.keys(node.children);
    childKeys.forEach(childKey => {
      renderNode(childKey, node.children[childKey], childrenContainer);
    });
    container.appendChild(group);
  }
};

Object.keys(tree).forEach(key => {
  if (key!=="iTime") renderNode(key, tree[key], uniforms);
});

const controls = new OrbitControls(camera,renderer.domElement);
controls.addEventListener("change",() => { needsRender = true; });
const update = (time) => {
  if (needsRender) {
    renderer.render(scene,camera);
    needsRender = false;
  }
  requestAnimationFrame(update);
}
update(0);
  
</script>
